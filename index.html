<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Computing Ethics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="homepage">
        <div class="hero-content">
            <h1>Ethics & Society</h1>
            
            <!-- Dynamic Welcome Badge -->
            <div id="welcomeText" class="welcome-badge">Welcome</div>
            
            <div class="circular-progress" id="mainCircle">
                <span id="progressValue">0%</span>
            </div>

            <!-- Name Input -->
            <div class="student-box" id="studentBox">
                <input type="text" id="studentName" placeholder="Enter your full name">
            </div>

            <!-- Buttons -->
            <button class="btn btn-next" id="startBtn" onclick="startCourse()" style="width: 100%;">Start Course</button>
            <button class="btn btn-restart" onclick="clearProgress()" style="margin-top: 15px; width: 100%; border: none;">Restart Course</button>
        </div>
    </section>
    
    <script src="script.js"></script>
</body>
</html>
